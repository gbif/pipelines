apiVersion: spark.stackable.tech/v1alpha1
kind: SparkApplication
metadata:
  name: full-index-build
spec:
  image: docker.gbif.org/ingest-gbif-spark:4.0.0-SNAPSHOT
  sparkImage:
    productVersion: 3.5.1
    stackableVersion: 24.7.0
    custom: docker.gbif.org/extended-stackable/spark-k8s-all-deps:3.5.1-stackable24.7.0-1.0.0
  mode: cluster
  mainApplicationFile: hdfs://gbif-hdfs/user/dave/ingest.jar
  mainClass: org.gbif.pipelines.spark.FullIndexBuild
  vectorAggregatorConfigMapName: gbif-vector-aggregator-discovery
  s3connection:
    inline:
      host: minio.minio-system.svc.cluster.local
      port: 9000
      accessStyle: Path
      credentials:
        secretClass: gbif-spark-history-lab-credentials-class
  logFileDirectory:
    s3:
      prefix: /
      bucket:
        inline:
          bucketName: spark-history-lab-bucket
  args:
    - "--coreDwcTerm=occurrence"
    - "--tableName=occurrence"
    - "--sourceDirectory=hdfs"
    - "--appName=full-index-build"
    - "--numberOfShards=2400"
    - "--earliestModificationTime=2026-02-12T00:00:00Z"
  sparkConf:
    "spark.driver.extraJavaOptions": "-XX:+UseG1GC -XX:InitiatingHeapOccupancyPercent=35"
    "spark.executor.extraJavaOptions": "-XX:+UseG1GC -XX:InitiatingHeapOccupancyPercent=35 -XX:ConcGCThread=20"
    "spark.dynamicAllocation.enabled": "false"
    "spark.decommission.enabled": "false"
    "spark.storage.decommission.shuffleBlocks.enabled": "false"
    "spark.storage.decommission.rddBlocks.enabled": "false"
    "spark.shuffle.readHostLocalDisk": "false"
    "spark.shuffle.service.enabled": "false"
    "spark.shuffle.manager": "org.apache.spark.shuffle.celeborn.SparkShuffleManager"
    "spark.serializer": "org.apache.spark.serializer.KryoSerializer"
    "spark.celeborn.client.spark.shuffle.writer": "hash"
    "spark.celeborn.client.push.replicate.enabled": "true"
    "spark.sql.adaptive.localShuffleReader.enabled": "false"
    "spark.sql.adaptive.enabled": "true"
    "spark.sql.adaptive.skewJoin.enabled": "true"
    "spark.shuffle.sort.io.plugin.class": "org.apache.spark.shuffle.celeborn.CelebornShuffleDataIO"
    "spark.celeborn.master.endpoints": "gbif-shuffle-service-celeborn-master-0.gbif-shuffle-service-celeborn-master-svc.test:9097,gbif-shuffle-service-celeborn-master-1.gbif-shuffle-service-celeborn-master-svc.test:9097,gbif-shuffle-service-celeborn-master-2.gbif-shuffle-service-celeborn-master-svc.test:9097"
    "spark.files.fetchTimeout": "300s"
    "spark.sql.shuffle.partitions": "2400"
    "spark.default.parallelism": "2400"
    "spark.sql.adaptive.advisoryPartitionSizeInBytes": "128MB"
    "spark.io.compression.codec": "lz4"
    "spark.memory.storageFraction": "0.1"
    "spark.cleaner.periodicGC.interval": "1min"
    "spark.jars.ivy": "/tmp"
    "spark.jars.ivySettings": "/tmp/ivy-settings.xml"
    "spark.broadcast.compress": "true"
    "spark.checkpoint.compress": "true"
    "spark.executor.heartbeatInterval": "30s"
    "spark.network.timeout": "900s"
    "spark.rdd.compress": "true"
    "spark.sql.files.maxPartitionBytes": "268435456" # 256MB
    "spark.sql.files.openCostInBytes": "33554432"
    "spark.sql.hive.dropTableInPurge": "true"
    "spark.shuffle.io.maxRetries": "5"
    "spark.shuffle.io.retryWait": "300s"
    "spark.driver.extraClassPath": "/etc/hadoop/conf/:/etc/gbif/:/stackable/spark/extra-jars/*:/stackable/spark/jobs/"
    "spark.executor.extraClassPath": "/etc/hadoop/conf/:/etc/gbif/:/stackable/spark/extra-jars/*:/stackable/spark/jobs/"
    "spark.kubernetes.allocation.batch.size": "5"
    "spark.kubernetes.scheduler.name": "yunikorn"
    "spark.kubernetes.executor.label.queue": "root.lab.pipelines"
    "spark.kubernetes.submit.label.queue": "root.lab.pipelines"
    "spark.executor.instances": "30"
    "spark.executor.cores": "8"
    "spark.executor.memoryOverheadFactor": "0.15"
    "spark.driver.cores": "4"
    "spark.driver.memoryOverheadFactor": "0.10"
    "spark.kubernetes.executor.podNamePrefix": "full-index-build"
    "spark.kubernetes.driver.ownPersistentVolumeClaim": "true"
    "spark.kubernetes.driver.reusePersistentVolumeClaim": "true"
    "spark.kubernetes.driver.waitToReusePersistentVolumeClaim": "true"
#    "spark.shuffle.sort.io.plugin.class": "org.apache.spark.shuffle.KubernetesLocalDiskShuffleDataIO"
    "spark.kubernetes.executor.volumes.persistentVolumeClaim.spark-local-dir-1.options.claimName": "OnDemand"
    "spark.kubernetes.executor.volumes.persistentVolumeClaim.spark-local-dir-1.options.storageClass": "local-path-delete"
    "spark.kubernetes.executor.volumes.persistentVolumeClaim.spark-local-dir-1.options.sizeLimit": "72Gi"
    "spark.kubernetes.executor.volumes.persistentVolumeClaim.spark-local-dir-1.mount.readOnly": "false"
    "spark.kubernetes.executor.volumes.persistentVolumeClaim.spark-local-dir-1.mount.path": "/data/spark-1/executor"
    "spark.kubernetes.driver.volumes.persistentVolumeClaim.checkpoint.options.claimName": "OnDemand"
    "spark.kubernetes.driver.volumes.persistentVolumeClaim.checkpoint.options.storageClass": "local-path-delete"
    "spark.kubernetes.driver.volumes.persistentVolumeClaim.checkpoint.mount.readOnly": "false"
    "spark.kubernetes.driver.volumes.persistentVolumeClaim.checkpoint.mount.path": "/data"
    "spark.kubernetes.driver.volumes.persistentVolumeClaim.checkpoint.options.sizeLimit": "10Gi"
  volumes:
    - name: ivy-settings
      configMap:
        name: gbif-airflow-ivy
        items:
          - key: ivy-settings.xml
            path: ivy-settings.xml
    - name: hdfs-env
      configMap:
        name: gbif-hdfs
        items:
          - key: core-site.xml
            path: core-site.xml
          - key: hdfs-site.xml
            path: hdfs-site.xml
    - name: hive-env
      configMap:
        name: gbif-hive-metastore-custom
        items:
          - key: hive-site.xml
            path: hive-site.xml
    - name: hbase-env
      configMap:
        name: gbif-hbase
        items:
          - key: hbase-site.xml
            path: hbase-site.xml
    - name: pipelines-spark-yaml
      configMap:
        name: pipelines-spark-yaml
        items:
          - key: pipelines-spark.yaml
            path: pipelines-spark.yaml
  job:
    podOverrides:
      metadata:
        labels:
          queue: "root.lab.pipelines"
    config:
      volumeMounts:
        - name: ivy-settings
          mountPath: /tmp/ivy-settings.xml
          subPath: ivy-settings.xml
  driver:
    podOverrides:
      metadata:
        labels:
          queue: "root.lab.pipelines"
      spec:
        initContainers:
          - name: job
            imagePullPolicy: Always
            resources:
              limits:
                cpu: 500m
                memory: 256Mi
              requests:
                cpu: 250m
                memory: 128Mi
    config:
      resources:
        cpu:
          min: "2000m"
          max: "8000m"
        memory:
          limit: "4Gi"
      logging:
        enableVectorAgent: true
        containers:
          vector:
            file:
              level: "WARN"
          spark:
            console:
              level: "INFO"
            file:
              level: "INFO"
            loggers:
              ROOT:
                level: "INFO"
      volumeMounts:
        - name: ivy-settings
          mountPath: /tmp/ivy-settings.xml
          subPath: ivy-settings.xml
        - name: hdfs-env
          mountPath: /etc/hadoop/conf/core-site.xml
          subPath: core-site.xml
        - name: hdfs-env
          mountPath: /etc/hadoop/conf/hdfs-site.xml
          subPath: hdfs-site.xml
        - name: hive-env
          mountPath: /etc/hadoop/conf/hive-site.xml
          subPath: hive-site.xml
        - name: hbase-env
          mountPath: /etc/hadoop/conf/hbase-site.xml
          subPath: hbase-site.xml
        - name: pipelines-spark-yaml
          mountPath: /tmp/pipelines-spark.yaml
          subPath: pipelines-spark.yaml
  executor:
    podOverrides:
      metadata:
        labels:
          queue: "root.lab.pipelines"
      spec:
        affinity:
          nodeAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
              nodeSelectorTerms:
                - matchExpressions:
                    - key: kubernetes.io/hostname
                      operator: NotIn
                      values:
                        - c6p4
                        - c6p5
                        - c7p9
                        - c7p10
        initContainers:
          - name: job
            imagePullPolicy: Always
            resources:
              limits:
                cpu: 500m
                memory: 256Mi
              requests:
                cpu: 250m
                memory: 128Mi
    config:
      resources:
        cpu:
          min: "1000m"
          max: "8000m"
        memory:
          limit: "30Gi"
      logging:
        enableVectorAgent: true
        containers:
          vector:
            file:
              level: "WARN"
          spark:
            console:
              level: "INFO"
            file:
              level: "INFO"
            loggers:
              ROOT:
                level: "INFO"
      volumeMounts:
        - name: ivy-settings
          mountPath: /tmp/ivy-settings.xml
          subPath: ivy-settings.xml
        - name: hdfs-env
          mountPath: /etc/hadoop/conf/core-site.xml
          subPath: core-site.xml
        - name: hdfs-env
          mountPath: /etc/hadoop/conf/hdfs-site.xml
          subPath: hdfs-site.xml
        - name: hive-env
          mountPath: /etc/hadoop/conf/hive-site.xml
          subPath: hive-site.xml
        - name: hbase-env
          mountPath: /etc/hadoop/conf/hbase-site.xml
          subPath: hbase-site.xml
        - name: pipelines-spark-yaml
          mountPath: /tmp/pipelines-spark.yaml
          subPath: pipelines-spark.yaml