  history_expire_max_snapshot_age_ms: 3888000000
  history_expire_min_snapshots_to_keep: 10
processingConfigs:
  # simple support for expressions in the format a < x < b
  "recordCount < 100_000":
    description: "less than 100k"
    args:
      - "--numberOfShards=1"
    driverMemoryOverheadFactor: "0.10"
    executorMemoryOverheadFactor: "0.15"
    driverCores: 1
    executorInstances: 2
    executorCores: 10
    defaultParallelism: 10
    driverMinCpu: "2000m"
    driverMaxCpu: "8000m"
    driverLimitMemory: "4Gi"
    executorMinCpu: "1000m"
    executorMaxCpu: "8000m"
    executorLimitMemory: "30Gi"
  "100_000 <= recordCount < 250_000":
    description: "100_000 to 250_000"
    args:
      - "--numberOfShards=10"
    driverMemoryOverheadFactor: "0.10"
    executorMemoryOverheadFactor: "0.15"
    driverCores: 4
    executorInstances: 10
    executorCores: 10
    defaultParallelism: 100
    driverMinCpu: "2000m"
    driverMaxCpu: "8000m"
    driverLimitMemory: "4Gi"
    executorMinCpu: "1000m"
    executorMaxCpu: "8000m"
    executorLimitMemory: "30Gi"
  "250_000 <= recordCount < 500_000":
